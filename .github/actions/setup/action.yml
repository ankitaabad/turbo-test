name: Setup
description: Install pnpm, Node, and dependencies with caching

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        run_install: false

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
