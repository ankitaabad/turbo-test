name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - run: pnpm turbo lint typecheck

  build:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - run: pnpm turbo build
