name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Require tag
        if: github.ref_type != 'tag'
        run: |
          echo "::error::Deploy can only be triggered from a tag, not a branch"
          exit 1

      - name: Resolve artifact from tag
        id: resolve
        run: |
          TAG="${{ github.ref_name }}"

          PREFIX=$(echo "$TAG" | cut -d- -f1)
          BUILD_NUM=$(echo "$TAG" | cut -d- -f2)
          HASH=$(echo "$TAG" | cut -d- -f3)

          if [ -z "$PREFIX" ] || [ -z "$BUILD_NUM" ] || [ -z "$HASH" ]; then
            echo "::error::Invalid tag format. Expected: fe-1-a1b2c3d4"
            exit 1
          fi

          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "buildNumber=${BUILD_NUM}" >> "$GITHUB_OUTPUT"
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"

          echo "::notice::Resolved ${TAG}"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" --dir ./dist

      - name: Deploy
        run: |
          echo "=== Deploying ${{ steps.resolve.outputs.prefix }} ==="
          echo "Tag:         ${{ github.ref_name }}"
          echo "Build:       ${{ steps.resolve.outputs.buildNumber }}"
          echo "Hash:        ${{ steps.resolve.outputs.hash }}"

          if [ -f ./dist/manifest.json ]; then
            echo "Manifest:"
            cat ./dist/manifest.json
          fi

          echo ""
          echo "Files:"
          find ./dist -type f | sort
          echo ""
          echo "::notice::Deploy complete for ${{ github.ref_name }}"
