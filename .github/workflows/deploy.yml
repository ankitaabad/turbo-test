name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g., fe-1-a1b2c3d4)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve artifact from tag
        id: resolve
        run: |
          TAG="${{ inputs.tag }}"

          PREFIX=$(echo "$TAG" | cut -d- -f1)
          BUILD_NUM=$(echo "$TAG" | cut -d- -f2)
          HASH=$(echo "$TAG" | cut -d- -f3)

          if [ -z "$PREFIX" ] || [ -z "$BUILD_NUM" ] || [ -z "$HASH" ]; then
            echo "::error::Invalid tag format. Expected: fe-1-a1b2c3d4"
            exit 1
          fi

          ARTIFACT="${PREFIX}-${HASH}"

          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "buildNumber=${BUILD_NUM}" >> "$GITHUB_OUTPUT"
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

          echo "::notice::Resolved ${TAG} → artifact ${ARTIFACT}"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.resolve.outputs.artifact }}
          path: ./dist

      - name: Deploy
        run: |
          echo "=== Deploying ${{ steps.resolve.outputs.prefix }} ==="
          echo "Tag:         ${{ inputs.tag }}"
          echo "Build:       ${{ steps.resolve.outputs.buildNumber }}"
          echo "Hash:        ${{ steps.resolve.outputs.hash }}"

          if [ -f ./dist/manifest.json ]; then
            echo "Manifest:"
            cat ./dist/manifest.json
          fi

          echo ""
          echo "Files:"
          find ./dist -type f | sort
          echo ""
          echo "::notice::Deploy complete for ${{ inputs.tag }}"
