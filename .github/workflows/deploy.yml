name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g., fe-v0.0.1)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve artifact from tag
        id: resolve
        run: |
          TAG="${{ inputs.tag }}"

          HASH=$(git tag -l --format='%(contents)' "$TAG" | grep -oP 'turbo-hash:\s+\K\S+')

          if [ -z "$HASH" ]; then
            echo "::error::Tag ${TAG} has no turbo-hash metadata"
            exit 1
          fi

          PREFIX=$(echo "$TAG" | grep -oP '^(fe|be)')

          if [ -z "$PREFIX" ]; then
            echo "::error::Cannot determine package prefix from tag ${TAG}"
            exit 1
          fi

          ARTIFACT="${PREFIX}-${HASH}"

          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

          echo "::notice::Resolved ${TAG} → artifact ${ARTIFACT}"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.resolve.outputs.artifact }}
          path: ./dist

      - name: Deploy
        run: |
          echo "=== Deploying ${{ steps.resolve.outputs.prefix }} ==="
          echo "Tag:    ${{ inputs.tag }}"
          echo "Hash:   ${{ steps.resolve.outputs.hash }}"
          echo "Files:"
          find ./dist -type f | sort
          echo ""
          echo "::notice::Deploy complete for ${{ inputs.tag }}"
