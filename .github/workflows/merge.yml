name: Merge

on:
  push:
    branches: [main]

concurrency:
  group: merge
  cancel-in-progress: false

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - run: pnpm turbo lint typecheck

  build:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: ./.github/actions/setup
        with:
          fetch-depth: '0'

      - name: Build, tag, and upload
        id: release
        shell: bash
        run: |
          set -euo pipefail

          dry_hash() {
            local pkg=$1
            echo "$DRY_JSON" | jq -r ".tasks[] | select(.taskId == \"${pkg}#build\") | .hash[:8]"
          }

          artifact_exists() {
            local name=$1
            local count
            count=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=${name}" --jq '.total_count')
            [ "$count" -gt 0 ]
          }

          tag_package() {
            local prefix=$1 pkg=$2 hash=$3
            local latest tag num

            latest=$(git tag -l "${prefix}-*" | sed "s/^${prefix}-//" | grep -E '^[0-9]+-' | cut -d- -f1 | sort -n | tail -1)
            num=$(( ${latest:-0} + 1 ))
            tag="${prefix}-${num}-${hash}"

            git tag -a "$tag" -m "turbo-hash: ${hash}"
            git push origin "$tag"
            echo "::notice::Created tag ${tag}"

            printf '{"tag":"%s","buildNumber":%s,"hash":"%s"}\n' "$tag" "$num" "$hash" > "${pkg}/dist/manifest.json"
          }

          DRY_JSON=$(pnpm turbo build --dry=json 2>&1 | tail -n +2)

          FE_HASH=$(dry_hash frontend)
          BE_HASH=$(dry_hash backend)

          FE_UPLOAD=false
          BE_UPLOAD=false
          NEED_BUILD=false

          if [ -n "$FE_HASH" ] && ! artifact_exists "fe-${FE_HASH}"; then
            FE_UPLOAD=true
            NEED_BUILD=true
          else
            echo "::notice::Artifact fe-${FE_HASH:-?} already exists — skipping"
          fi

          if [ -n "$BE_HASH" ] && ! artifact_exists "be-${BE_HASH}"; then
            BE_UPLOAD=true
            NEED_BUILD=true
          else
            echo "::notice::Artifact be-${BE_HASH:-?} already exists — skipping"
          fi

          if [ "$NEED_BUILD" = true ]; then
            pnpm turbo build
          fi

          if [ "$FE_UPLOAD" = true ]; then
            tag_package "fe" "frontend" "$FE_HASH"
          fi

          if [ "$BE_UPLOAD" = true ]; then
            tag_package "be" "backend" "$BE_HASH"
          fi

          echo "frontend_upload=${FE_UPLOAD}" >> "$GITHUB_OUTPUT"
          echo "frontend_hash=${FE_HASH:-}" >> "$GITHUB_OUTPUT"
          echo "backend_upload=${BE_UPLOAD}" >> "$GITHUB_OUTPUT"
          echo "backend_hash=${BE_HASH:-}" >> "$GITHUB_OUTPUT"

      - name: Upload frontend artifact
        if: steps.release.outputs.frontend_upload == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fe-${{ steps.release.outputs.frontend_hash }}
          path: frontend/dist/

      - name: Upload backend artifact
        if: steps.release.outputs.backend_upload == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: be-${{ steps.release.outputs.backend_hash }}
          path: backend/dist/
