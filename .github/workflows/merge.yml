name: Merge

on:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - run: pnpm turbo lint typecheck

  build:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: ./.github/actions/setup
        with:
          fetch-depth: '0'

      - name: Build, tag, and upload
        id: release
        shell: bash
        run: |
          set -euo pipefail

          bump_semver() {
            local v=$1
            local major minor patch
            IFS='.' read -r major minor patch <<< "$v"
            patch=$((patch + 1))
            if [ "$patch" -ge 6 ]; then
              patch=0
              minor=$((minor + 1))
              if [ "$minor" -ge 10 ]; then
                minor=0
                major=$((major + 1))
              fi
            fi
            echo "${major}.${minor}.${patch}"
          }

          SUMMARY=$(pnpm turbo build --summarize 2>&1 | sed -n 's/^Summary:\s*//p')

          if [ -z "$SUMMARY" ] || [ ! -f "$SUMMARY" ]; then
            echo "::error::Failed to get run summary from turbo build"
            exit 1
          fi

          CHANGED=$(jq -r '.tasks[] | select(.taskId | endswith("#build")) | select(.cache.status == "MISS") | .package' "$SUMMARY")

          echo "fe_miss=false" >> "$GITHUB_OUTPUT"
          echo "be_miss=false" >> "$GITHUB_OUTPUT"

          if [ -z "$CHANGED" ]; then
            echo "::notice::All builds cached — no new tags"
          fi

          for pkg in $CHANGED; do
            case "$pkg" in
              frontend)
                PREFIX="fe"
                echo "fe_miss=true" >> "$GITHUB_OUTPUT"
                ;;
              backend)
                PREFIX="be"
                echo "be_miss=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                continue
                ;;
            esac

            LATEST=$(git tag -l "${PREFIX}-v*" | sort -V | tail -1)
            if [ -z "$LATEST" ]; then
              VERSION="0.0.1"
            else
              CURRENT="${LATEST#${PREFIX}-v}"
              VERSION=$(bump_semver "$CURRENT")
            fi

            TAG="${PREFIX}-v${VERSION}"
            git tag "$TAG"
            git push origin "$TAG"
            echo "::notice::Created tag ${TAG}"
          done

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-dist
          path: frontend/dist/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: be-dist
          path: backend/dist/
