name: Merge

on:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - run: pnpm turbo lint typecheck

  build:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: ./.github/actions/setup
        with:
          fetch-depth: '0'

      - name: Build, tag, and upload
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SUMMARY=$(pnpm turbo build --summarize 2>&1 | sed -n 's/^Summary:\s*//p')

          if [ -z "$SUMMARY" ] || [ ! -f "$SUMMARY" ]; then
            echo "::error::Failed to get run summary from turbo build"
            exit 1
          fi

          for pkg in frontend backend; do
            HASH=$(jq -r ".tasks[] | select(.taskId == \"${pkg}#build\") | .hash" "$SUMMARY")
            if [ -z "$HASH" ]; then
              continue
            fi

            case "$pkg" in
              frontend) PREFIX="fe" ;;
              backend)  PREFIX="be" ;;
            esac

            ARTIFACT="${PREFIX}-${HASH}"

            EXISTS=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=${ARTIFACT}" --jq '.total_count')

            if [ "$EXISTS" -gt 0 ]; then
              echo "::notice::Artifact ${ARTIFACT} already exists — skipping"
              continue
            fi

            LATEST_NUM=$(git tag -l "${PREFIX}-*" | sed "s/^${PREFIX}-//" | grep -E '^[0-9]+-' | cut -d- -f1 | sort -n | tail -1)
            BUILD_NUM=$(( ${LATEST_NUM:-0} + 1 ))

            TAG="${PREFIX}-${BUILD_NUM}-${HASH}"
            git tag -a "$TAG" -m "turbo-hash: ${HASH}"
            git push origin "$TAG"
            echo "::notice::Created tag ${TAG}"

            printf '{"tag":"%s","buildNumber":%s,"hash":"%s"}\n' "$TAG" "$BUILD_NUM" "$HASH" > "${pkg}/dist/manifest.json"

            echo "${pkg}_upload=true" >> "$GITHUB_OUTPUT"
            echo "${pkg}_hash=${HASH}" >> "$GITHUB_OUTPUT"
          done

      - name: Upload frontend artifact
        if: steps.release.outputs.frontend_upload == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fe-${{ steps.release.outputs.frontend_hash }}
          path: frontend/dist/

      - name: Upload backend artifact
        if: steps.release.outputs.backend_upload == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: be-${{ steps.release.outputs.backend_hash }}
          path: backend/dist/
