name: Merge

on:
  push:
    branches: [main]

concurrency:
  group: merge
  cancel-in-progress: false

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/node-pnpm

      - run: pnpm turbo lint typecheck --remote-only
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  build:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: '0'

      - uses: ./.github/actions/node-pnpm

      - name: Build, tag, and upload
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: |
          set -euo pipefail

          artifact_exists() {
            local name=$1
            local prefix=$(echo "$name" | cut -d- -f1)
            local hash=$(echo "$name" | cut -d- -f2)
            git tag -l "${prefix}-*-${hash}" | grep -q .
          }

          tag_package() {
            local prefix=$1 pkg=$2 hash=$3
            local latest tag num

            latest=$(git tag -l "${prefix}-*" | sed -n "s/^${prefix}-\([0-9]\{1,\}\)-.*/\1/p" | sort -n | tail -1)
            num=$(( ${latest:-0} + 1 ))
            tag="${prefix}-${num}-${hash}"

            git tag -a "$tag" -m "turbo-hash: ${hash}"
            git push origin "$tag"

            mkdir -p "${pkg}/dist"
            printf '{"tag":"%s","buildNumber":%s,"hash":"%s"}\n' "$tag" "$num" "$hash" > "${pkg}/dist/manifest.json"

            gh release create "$tag" "${pkg}/dist/*" \
              --title "${prefix} build ${num}" \
              --notes "turbo-hash: ${hash}"
            echo "::notice::Created tag ${tag}"
          }

          DRY_JSON=$(pnpm turbo build --dry=json 2>&1 | sed -n '/^{/,$ p')

          read FE_HASH BE_HASH <<< $(echo "$DRY_JSON" | jq -r '
            .tasks[]
            | select(.taskId == "frontend#build" or .taskId == "backend#build")
            | .hash[:8]
          ' | tr '\n' ' ')

          FE_UPLOAD=false
          BE_UPLOAD=false
          NEED_BUILD=false

          if [ -n "$FE_HASH" ] && ! artifact_exists "fe-${FE_HASH}"; then
            FE_UPLOAD=true
            NEED_BUILD=true
          else
            echo "::notice::Release fe-${FE_HASH:-?} already exists — skipping"
          fi

          if [ -n "$BE_HASH" ] && ! artifact_exists "be-${BE_HASH}"; then
            BE_UPLOAD=true
            NEED_BUILD=true
          else
            echo "::notice::Release be-${BE_HASH:-?} already exists — skipping"
          fi

          if [ "$NEED_BUILD" = true ]; then
            pnpm turbo build --remote-only
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$FE_UPLOAD" = true ]; then
            tag_package "fe" "frontend" "$FE_HASH"
          fi

          if [ "$BE_UPLOAD" = true ]; then
            tag_package "be" "backend" "$BE_HASH"
          fi

